# Render Blueprint — backend API
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: dx-slopscan-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: GITHUB_TOKEN
        sync: false
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: PORT
        value: "8000"
