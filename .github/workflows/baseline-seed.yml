name: Baseline seed

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo build --filter=@slop-scanner/detection --filter=@slop-scanner/shared-types
      - run: pnpm seed:baseline
      - name: Upload baseline artifact
        uses: actions/upload-artifact@v4
        with:
          name: baseline-scores
          path: data/baseline/baseline-scores.json
