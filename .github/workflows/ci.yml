name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo lint
      - run: pnpm turbo typecheck
      - run: pnpm turbo build
      - run: pnpm turbo test
      - name: Install Playwright browsers
        run: pnpm --filter @slop-scanner/e2e exec playwright install --with-deps chromium
      - run: pnpm turbo test:e2e
      - name: Bake-off accuracy (precision must be ≥ 70%)
        run: pnpm --filter @slop-scanner/detection test -- src/bakeoff/bakeoff.test.ts
      - run: tsx scripts/run-bakeoff.ts
      - name: Bundle size check (gzip)
        run: |
          gzip -c apps/web/dist/assets/*.js | wc -c | awk '{ if ($1 > 512000) exit 1 }'
